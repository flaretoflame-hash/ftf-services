<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0a0805;font-family:'Jost',sans-serif;min-height:100vh;}

.hero-stage{position:relative;width:100%;background:#0a0805;overflow:hidden;}
.amb{position:absolute;inset:0;pointer-events:none;z-index:0;}
.amb::before{content:'';position:absolute;right:-60px;top:40px;width:320px;height:580px;background:radial-gradient(ellipse at 55% 35%,rgba(130,55,175,0.24) 0%,rgba(90,25,135,0.10) 45%,transparent 70%);filter:blur(45px);animation:drift 10s ease-in-out infinite alternate;}
.amb::after{content:'';position:absolute;left:-40px;bottom:60px;width:260px;height:400px;background:radial-gradient(ellipse at 40% 60%,rgba(201,168,76,0.18) 0%,rgba(201,168,76,0.06) 50%,transparent 72%);filter:blur(50px);animation:drift2 13s ease-in-out infinite alternate;}
@keyframes drift{0%{transform:translateY(0) scale(1);}100%{transform:translateY(-22px) scale(1.06);}}
@keyframes drift2{0%{transform:translateY(0) scale(1);}100%{transform:translateY(18px) scale(1.08);}}
.hero{position:relative;height:100vh;min-height:620px;max-height:860px;overflow:hidden;max-width:420px;margin:0 auto;padding-top:48px;}
.aisha{position:absolute;right:0;top:0;width:82%;height:100%;z-index:1;}
.aisha img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.aisha::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,#0a0805 0%,rgba(13,9,16,0.92) 12%,rgba(13,9,16,0.72) 24%,rgba(13,9,16,0.42) 38%,rgba(13,9,16,0.18) 54%,rgba(13,9,16,0.05) 70%,transparent 88%),linear-gradient(to top,#0a0805 0%,rgba(13,9,16,0.45) 10%,rgba(13,9,16,0.15) 22%,rgba(13,9,16,0.03) 35%,transparent 50%),linear-gradient(to bottom,#0a0805 0%,transparent 12%);}
.aisha-tint{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(160deg,transparent 40%,rgba(80,20,110,0.16) 100%);}
.hero-body{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:flex-end;padding:0 26px 46px;}
.hero-tag{font-size:9px;letter-spacing:5px;color:#C9A84C;text-transform:uppercase;font-weight:600;margin-bottom:14px;}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:700;color:#FAF7F2;line-height:0.98;letter-spacing:-1.2px;margin-bottom:12px;text-shadow:0 2px 30px rgba(0,0,0,0.55);}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:rgba(201,168,76,0.95);margin-bottom:28px;line-height:1.3;text-shadow:0 2px 16px rgba(0,0,0,0.6);max-width:78%;}
.hero-cta{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,#d4af37,#b89326);color:#fff;padding:15px 30px;border-radius:13px;font-family:'Jost',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;box-shadow:0 8px 30px rgba(180,140,30,0.5);transition:transform .2s ease;align-self:flex-start;}
.hero-cta:hover{transform:translateY(-2px);}
.hero-cta svg{width:18px;height:18px;fill:#fff;}
.scroll-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:4;font-size:8px;letter-spacing:2px;color:rgba(250,247,242,0.4);text-transform:uppercase;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(5px);}}

.section{padding:38px 14px 90px;display:flex;flex-direction:column;align-items:center;}
.sec-head{text-align:center;margin-bottom:22px;}
.sec-tag{font-size:9px;letter-spacing:4px;color:#C9A84C;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#FAF7F2;letter-spacing:-0.5px;}
.sec-hint{margin-top:9px;font-size:9px;color:rgba(250,247,242,0.3);letter-spacing:1px;}

.filter-wrap{width:100%;max-width:640px;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-bar{display:flex;gap:8px;padding:2px 0 6px;width:max-content;margin:0 auto;}
.filter-btn{font-family:'Jost',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;padding:7px 14px;border-radius:7px;border:1.5px solid rgba(201,168,76,0.22);background:rgba(201,168,76,0.06);color:rgba(201,168,76,0.55);cursor:pointer;white-space:nowrap;transition:all .25s ease;-webkit-tap-highlight-color:transparent;}
.filter-btn:hover{border-color:rgba(201,168,76,0.45);color:rgba(201,168,76,0.85);}
.filter-btn.active{background:#C9A84C;color:#0a0805;border-color:#C9A84C;box-shadow:0 3px 14px rgba(201,168,76,0.35);}

.results-row{width:100%;max-width:640px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.results-count{font-size:10px;letter-spacing:1.5px;color:rgba(201,168,76,0.4);text-transform:uppercase;font-weight:600;}
.page-label{font-size:10px;letter-spacing:1.5px;color:rgba(250,247,242,0.2);text-transform:uppercase;font-weight:600;}

.cards{width:100%;max-width:640px;display:flex;flex-direction:column;gap:14px;}
.card{position:relative;width:100%;border-radius:20px;overflow:hidden;cursor:pointer;transition:all .45s cubic-bezier(0.16,1,0.3,1);min-height:140px;}
.card:hover{transform:translateY(-3px);}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:left center;}
.card-overlay{position:absolute;inset:0;pointer-events:none;}
.card-inner{position:relative;display:flex;flex-direction:row;align-items:stretch;min-height:140px;}
.card-spacer{width:30%;flex-shrink:0;}
.card-text{flex:1;display:flex;flex-direction:column;justify-content:center;padding:18px 22px 52px 16px;gap:5px;}
.card-cat{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.14em;font-weight:700;text-transform:uppercase;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1.1;letter-spacing:-0.3px;}
.card-divider{width:36px;height:2px;opacity:0.7;margin:4px 0;}
.card-short{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;font-weight:600;line-height:1.45;}
.card-full{max-height:0;overflow:hidden;opacity:0;transition:max-height .5s cubic-bezier(0.16,1,0.3,1),opacity .4s ease,margin .4s ease,padding .4s ease;margin-top:0;font-family:'Jost',sans-serif;font-size:13px;font-weight:400;line-height:1.6;}
.card.open .card-full{max-height:240px;opacity:1;margin-top:10px;padding-top:10px;border-top-width:1px;border-top-style:solid;}
.card-brand{display:inline-block;max-height:0;overflow:hidden;opacity:0;transition:all .45s ease;margin-top:0;border-radius:5px;padding:0 9px;font-family:'Jost',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;border-width:1px;border-style:solid;}
.card.open .card-brand{max-height:30px;opacity:1;margin-top:9px;padding:4px 9px;}
.card-expand{position:absolute;bottom:11px;left:32%;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:1.3px;text-transform:uppercase;font-weight:700;transition:opacity .3s;}
.book-btn{position:absolute;bottom:12px;right:16px;background:linear-gradient(135deg,#d4af37,#b89326);color:#fff;padding:9px 18px;border-radius:9px;font-family:'Jost',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;text-decoration:none;box-shadow:0 4px 18px rgba(180,140,30,0.5);z-index:10;white-space:nowrap;}
.story-label{position:absolute;top:14px;left:14px;background:rgba(0,0,0,0.36);backdrop-filter:blur(8px);border-radius:6px;padding:3px 9px;font-family:'Cormorant Garamond',serif;font-size:10px;font-style:italic;color:rgba(255,255,255,0.82);}

.pagination{width:100%;max-width:640px;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:28px;}
.pg-btn{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:9px 20px;border-radius:9px;border:1.5px solid rgba(201,168,76,0.25);background:transparent;color:rgba(201,168,76,0.5);cursor:pointer;transition:all .25s ease;-webkit-tap-highlight-color:transparent;}
.pg-btn:hover:not(:disabled){border-color:#C9A84C;color:#C9A84C;}
.pg-btn:disabled{opacity:0.2;cursor:not-allowed;}
.pg-dots{display:flex;gap:6px;align-items:center;}
.pg-dot{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,0.18);cursor:pointer;transition:all .25s ease;}
.pg-dot.active{background:#C9A84C;width:18px;border-radius:3px;}

.footer{padding:26px 14px 40px;text-align:center;}
.footer-line{font-size:8px;letter-spacing:3px;color:rgba(201,168,76,0.35);text-transform:uppercase;font-weight:600;}

.wa-fab{position:fixed;bottom:22px;right:18px;z-index:100;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#25d366,#128c7e);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(37,211,102,0.45);text-decoration:none;transition:transform .2s ease,box-shadow .2s ease;}
.wa-fab:hover{transform:scale(1.08);box-shadow:0 8px 32px rgba(37,211,102,0.55);}
.wa-fab svg{width:27px;height:27px;fill:#fff;}

.empty-state{text-align:center;padding:50px 20px;color:rgba(201,168,76,0.35);}
.empty-state .em-icon{font-size:36px;margin-bottom:12px;}
.empty-state .em-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;}
</style>
</head>

<script>
/* ── WORKER URL (no token in frontend) ── */
var WORKER_URL = 'https://ftf-airtable.flaretoflame.workers.dev';

/* ── CATEGORY CONFIG ── */
var CAT_MAP = {
  'Hair':      {key:'hair',      cat:'Hair Therapy',         catColor:'#7a3ab0', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/hair_ziaoxu.jpg',      imgPos:'18% center', overlayLight:true},
  'Skin':      {key:'skin',      cat:'Skin Ritual',          catColor:'#8a5020', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/skin_ykrobc.jpg',      imgPos:'22% center', overlayLight:true},
  'Makeup':    {key:'makeup',    cat:'Bridal Couture',       catColor:'#9a1a4a', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/makeup_aqpzal.jpg',    imgPos:'12% center', overlayLight:true},
  'Nails':     {key:'nails',     cat:'Nail Atelier',         catColor:'#0a6060', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/nails_fh8kny.jpg',     imgPos:'20% center', overlayLight:true},
  'Waxing':    {key:'waxing',    cat:'Body Ritual',          catColor:'#7a5008', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/waxing_cq0iir.jpg',    imgPos:'18% center', overlayLight:true},
  'Threading': {key:'threading', cat:'Precision Studio',     catColor:'#3a3a5a', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/threading_cmm20k.jpg', imgPos:'22% center', overlayLight:true},
  'Grooming':  {key:'grooming',  cat:"Men's Grooming",       catColor:'#4682B4', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/grooming_qid5gs.jpg',  imgPos:'18% center', overlayLight:false},
  'Signature': {key:'signature', cat:'Signature Experience', catColor:'#C9A84C', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/signature_wkkoc1.jpg', imgPos:'20% center', overlayLight:false},
  'Body':      {key:'body',      cat:'Body Ritual',          catColor:'#4A7C59', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/waxing_cq0iir.jpg',    imgPos:'18% center', overlayLight:true},
  'Kids':      {key:'kids',      cat:'Kids',                 catColor:'#D4956A', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/hair_ziaoxu.jpg',      imgPos:'18% center', overlayLight:true},
  'Packages':  {key:'packages',  cat:'Packages',             catColor:'#C9A84C', img:'https://res.cloudinary.com/dlstvhspu/image/upload/v1780140483/signature_wkkoc1.jpg', imgPos:'20% center', overlayLight:false}
};

/* ── SAFE FIELD READER — handles plain string OR {state,value,isStale} object ── */
function fv(field) {
  if (field === null || field === undefined) return '';
  if (typeof field === 'object' && field.value !== undefined) return field.value || '';
  return String(field);
}

var SERVICES = [];

function showLoading() {
  document.getElementById('cardsContainer').innerHTML = '<div class="empty-state"><div class="em-icon" style="font-size:28px;animation:bob 1.5s ease-in-out infinite">✦</div><div class="em-text" style="font-size:16px;margin-top:12px">Loading services...</div></div>';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('resultsCount').textContent = 'Loading...';
  document.getElementById('pageLabel').textContent = '';
}

async function loadFromAirtable() {
  showLoading();
  try {
    var res = await fetch(WORKER_URL);
    if (!res.ok) throw new Error('Worker error ' + res.status);
    var data = await res.json();
    var all = data.records || [];

    SERVICES = all.map(function(r, i) {
      var f = r.fields;
      var catKey = fv(f['Category']) || 'Hair';
      var cm = CAT_MAP[catKey] || CAT_MAP['Hair'];
      var name = fv(f['Service Name']) || fv(f['Name']) || 'Service';
      var exp = fv(f['Experience Detail']);
      var parts = exp.split('|');
      var brand = parts[0] ? parts[0].trim() : '';
      var ritual = parts[1] ? parts[1].trim() : '';
      var desc = fv(f['AI Service Description']) || ritual || 'A premium salon experience crafted for you.';
      var short = desc.length > 100 ? desc.substring(0, 97) + '...' : desc;
      var tier = fv(f['Tier']) || 'Classic';
      var sub = fv(f['Subcategory']) || '';
      var waName = encodeURIComponent(name);
      return {
        id: i,
        category: cm.key,
        img: cm.img,
        imgPos: cm.imgPos,
        overlayLight: cm.overlayLight,
        cat: cm.cat,
        catColor: cm.catColor,
        name: name,
        short: short,
        full: desc,
        brand: brand + (tier ? ' · ' + tier : ''),
        story: sub || catKey,
        waText: 'Hi%21%20I%27d%20like%20to%20book%3A%20' + waName
      };
    });

    buildFilters();
    currentFilter = 'all';
    currentPage = 1;
    openCards = {};
    renderPage();

  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('cardsContainer').innerHTML = '<div class="empty-state"><div class="em-icon">⚠</div><div class="em-text">Could not load services. Please refresh.</div></div>';
  }
}

function buildFilters() {
  var counts = {all: SERVICES.length};
  SERVICES.forEach(function(s) { counts[s.category] = (counts[s.category] || 0) + 1; });
  var catLabels = {all:'All Services',hair:'Hair',skin:'Skin',makeup:'Makeup',nails:'Nails',waxing:'Waxing',threading:'Threading',grooming:'Grooming',body:'Body',signature:'Signature',kids:'Kids',packages:'Packages'};
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  ['all','hair','skin','makeup','nails','waxing','threading','grooming','body','signature','kids','packages'].forEach(function(k) {
    if (k === 'all' || counts[k]) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn' + (k === 'all' ? ' active' : '');
      btn.textContent = (catLabels[k] || k) + (counts[k] ? ' (' + counts[k] + ')' : '');
      btn.onclick = (function(kk, b) { return function() { setFilter(kk, b); }; })(k, btn);
      bar.appendChild(btn);
    }
  });
}

var PER_PAGE = 5, currentFilter = 'all', currentPage = 1, openCards = {};

function getFiltered() {
  return currentFilter === 'all' ? SERVICES : SERVICES.filter(function(s) { return s.category === currentFilter; });
}

function setFilter(cat, btn) {
  currentFilter = cat; currentPage = 1; openCards = {};
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderPage();
}

function goPage(dir) {
  var f = getFiltered(), tp = Math.ceil(f.length / PER_PAGE);
  currentPage = Math.max(1, Math.min(currentPage + dir, tp));
  openCards = {};
  renderPage();
  document.querySelector('.section').scrollIntoView({behavior:'smooth'});
}

function goDot(p) {
  currentPage = p; openCards = {};
  renderPage();
  document.querySelector('.section').scrollIntoView({behavior:'smooth'});
}

function toggleCard(i) {
  openCards[i] = !openCards[i];
  var c = document.getElementById('lcard' + i), h = document.getElementById('lhint' + i);
  if (!c) return;
  if (openCards[i]) { c.classList.add('open'); h.textContent = '▲ Less'; }
  else { c.classList.remove('open'); h.textContent = '▼ More details'; }
}

function buildCard(s, i) {
  var light = s.overlayLight;
  var ovBg = light
    ? 'linear-gradient(to right,transparent 26%,rgba(248,243,236,0.88) 44%,rgba(245,239,230,0.98) 100%)'
    : 'linear-gradient(to right,transparent 26%,rgba(6,12,14,0.88) 44%,rgba(4,10,12,0.99) 100%)';
  var nameTxt  = light ? '#180800'              : '#FAF7F2';
  var shortTxt = light ? 'rgba(30,12,0,0.92)'   : 'rgba(250,247,242,0.92)';
  var fullTxt  = light ? 'rgba(25,10,0,0.95)'   : 'rgba(250,247,242,0.95)';
  var hintTxt  = light ? 'rgba(30,12,0,0.65)'   : 'rgba(250,247,242,0.65)';
  var cc = s.catColor;
  var borderTop = cc + '33', brandBg = cc + '18', brandBd = cc + '55';
  var brandCol = light ? cc : '#FAF7F2';
  var isOpen = openCards[i] || false;
  return '<div class="card' + (isOpen ? ' open' : '') + '" id="lcard' + i + '" onclick="toggleCard(' + i + ')">'
    + '<img class="card-img" src="' + s.img + '" alt="' + s.name + '" style="object-position:' + s.imgPos + '">'
    + '<div class="card-overlay" style="background:' + ovBg + '"></div>'
    + '<div class="card-inner"><div class="card-spacer"></div>'
    + '<div class="card-text">'
    + '<div class="card-cat" style="color:' + cc + '">' + s.cat.toUpperCase() + '</div>'
    + '<div class="card-name" style="color:' + nameTxt + '">' + s.name + '</div>'
    + '<div class="card-divider" style="background:' + cc + '"></div>'
    + '<div class="card-short" style="color:' + shortTxt + '">' + s.short + '</div>'
    + '<div class="card-full" style="color:' + fullTxt + ';border-top-color:' + borderTop + '">' + s.full + '</div>'
    + '<div class="card-brand" style="background:' + brandBg + ';border-color:' + brandBd + ';color:' + brandCol + '">' + s.brand + '</div>'
    + '</div></div>'
    + '<div class="card-expand" id="lhint' + i + '" style="color:' + hintTxt + '">' + (isOpen ? '▲ Less' : '▼ More details') + '</div>'
    + '<a class="book-btn" href="https://wa.me/919718831333?text=' + s.waText + '" target="_blank" onclick="event.stopPropagation()">Book Now →</a>'
    + '<div class="story-label">' + s.story + '</div>'
    + '</div>';
}

function renderPage() {
  var f = getFiltered(), total = f.length;
  var tp = Math.max(1, Math.ceil(total / PER_PAGE));
  var start = (currentPage - 1) * PER_PAGE;
  var slice = f.slice(start, start + PER_PAGE);
  var c = document.getElementById('cardsContainer');
  document.getElementById('resultsCount').textContent = total + (total === 1 ? ' Service' : ' Services');
  document.getElementById('pageLabel').textContent = 'Page ' + currentPage + ' of ' + tp;
  c.innerHTML = slice.length === 0
    ? '<div class="empty-state"><div class="em-icon">✦</div><div class="em-text">No services in this category yet.</div></div>'
    : slice.map(function(s, i) { return buildCard(s, i); }).join('');
  document.getElementById('prevBtn').disabled = (currentPage === 1);
  document.getElementById('nextBtn').disabled = (currentPage === tp);
  var d = '';
  for (var p = 1; p <= Math.min(tp, 12); p++) {
    d += '<div class="pg-dot' + (p === currentPage ? ' active' : '') + '" onclick="goDot(' + p + ')"></div>';
  }
  document.getElementById('pgDots').innerHTML = d;
  document.getElementById('pagination').style.display = (tp <= 1) ? 'none' : 'flex';
}

loadFromAirtable();
</script>
</body>
</html>
