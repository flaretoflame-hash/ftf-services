<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Our Team — Flare to Flame</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0a0805;font-family:'Jost',sans-serif;min-height:100vh;color:#FAF7F2;}

/* ── ambient glow (matches index hero) ── */
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.amb::before{content:'';position:absolute;right:-80px;top:30px;width:320px;height:520px;background:radial-gradient(ellipse at 55% 35%,rgba(130,55,175,0.16) 0%,transparent 70%);filter:blur(55px);animation:drift 14s ease-in-out infinite alternate;}
.amb::after{content:'';position:absolute;left:-60px;bottom:60px;width:280px;height:420px;background:radial-gradient(ellipse at 40% 60%,rgba(201,168,76,0.14) 0%,transparent 72%);filter:blur(55px);animation:drift2 17s ease-in-out infinite alternate;}
@keyframes drift{0%{transform:translateY(0) scale(1);}100%{transform:translateY(-20px) scale(1.06);}}
@keyframes drift2{0%{transform:translateY(0) scale(1);}100%{transform:translateY(16px) scale(1.08);}}

.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 16px 80px;}

/* ── header ── */
.top{padding:30px 8px 0;}
.back{display:inline-flex;align-items:center;gap:7px;background:transparent;border:none;color:rgba(201,168,76,0.78);font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:color .25s;}
.back:hover{color:#C9A84C;}

.head{text-align:center;padding:34px 14px 30px;}
.head-eyebrow{font-size:10px;letter-spacing:5px;color:#C9A84C;text-transform:uppercase;font-weight:600;margin-bottom:12px;opacity:0.9;}
.head-title{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:#FAF7F2;line-height:1.0;letter-spacing:-0.8px;}
.head-sub{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:rgba(201,168,76,0.92);margin-top:12px;line-height:1.4;}
.gold-rule{width:54px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);margin:22px auto 0;}

/* ── team grid ── */
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:34px;}
@media(max-width:380px){.team-grid{gap:12px;}}

.member{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:1/1.24;box-shadow:0 6px 22px rgba(0,0,0,0.3);opacity:0;transform:translateY(16px);animation:rise .55s cubic-bezier(0.16,1,0.3,1) forwards;}
.member:nth-child(1){animation-delay:.05s;}
.member:nth-child(2){animation-delay:.11s;}
.member:nth-child(3){animation-delay:.17s;}
.member:nth-child(4){animation-delay:.23s;}
.member:nth-child(5){animation-delay:.29s;}
.member:nth-child(6){animation-delay:.35s;}
.member:nth-child(7){animation-delay:.41s;}
.member:nth-child(8){animation-delay:.47s;}
@keyframes rise{to{opacity:1;transform:translateY(0);}}

.member img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .6s ease;}
.member:hover img{transform:scale(1.06);}
.member-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,5,2,0.9) 0%,rgba(8,5,2,0.28) 46%,rgba(8,5,2,0.08) 100%);}
.member-edge{position:absolute;inset:0;border-radius:18px;border:1px solid rgba(201,168,76,0.26);pointer-events:none;}
.member-label{position:absolute;left:0;right:0;bottom:0;padding:16px 16px 18px;text-align:center;}
.member-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#FAF7F2;line-height:1.1;letter-spacing:-0.3px;text-shadow:0 2px 12px rgba(0,0,0,0.6);}
.member-mark{width:24px;height:1px;background:rgba(201,168,76,0.6);margin:8px auto 0;}

/* ── loading skeletons ── */
.skel{position:relative;border-radius:18px;aspect-ratio:1/1.24;overflow:hidden;background:rgba(250,247,242,0.04);}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(250,247,242,0.03) 25%,rgba(250,247,242,0.08) 50%,rgba(250,247,242,0.03) 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
@keyframes shim{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── assembling / empty state ── */
.assembling{grid-column:1/-1;text-align:center;padding:60px 24px;}
.assembling-mark{font-size:34px;color:rgba(201,168,76,0.7);margin-bottom:16px;}
.assembling-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#FAF7F2;line-height:1.2;margin-bottom:10px;}
.assembling-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(201,168,76,0.85);line-height:1.5;max-width:340px;margin:0 auto;}

/* ── closing line + CTA ── */
.closing{text-align:center;margin-top:46px;padding:34px 24px;background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.2);border-radius:18px;}
.closing-mark{font-size:22px;color:#C9A84C;margin-bottom:12px;}
.closing-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:#FAF7F2;line-height:1.5;}
.closing-cta{display:inline-flex;align-items:center;gap:9px;background:#C9A84C;color:#0a0805;padding:14px 26px;border-radius:12px;font-family:'Jost',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;text-decoration:none;box-shadow:0 4px 18px rgba(201,168,76,0.3);margin-top:24px;transition:transform .25s,box-shadow .25s;}
.closing-cta:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(201,168,76,0.42);}
.closing-cta svg{width:19px;height:19px;fill:#0a0805;}

@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="amb"></div>
<div class="wrap">

  <div class="top">
    <a class="back" href="index.html">&lsaquo; Back to Home</a>
  </div>

  <div class="head">
    <div class="head-eyebrow">The Artists</div>
    <h1 class="head-title">Meet Our Team</h1>
    <p class="head-sub">The hands and hearts behind every transformation.</p>
    <div class="gold-rule"></div>
  </div>

  <div class="team-grid" id="teamGrid">
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>

  <div class="closing" id="closing" style="display:none;">
    <div class="closing-mark">&#10022;</div>
    <div class="closing-text">"You arrive as our guest,<br>and leave as the finest version of yourself."</div>
    <a class="closing-cta" href="https://wa.me/919718831333?text=Hi%20Flare%20to%20Flame%2C%20I%27d%20like%20to%20book%20an%20appointment" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Book an Appointment
    </a>
  </div>

</div>

<script>
var WORKER_URL = 'https://ftf-airtable.flaretoflame.workers.dev';

function esc(s){ return String(s||'').replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); }

async function loadTeam(){
  var grid = document.getElementById('teamGrid');
  var closing = document.getElementById('closing');
  try {
    var res = await fetch(WORKER_URL + '/team');
    if (!res.ok) throw new Error('team ' + res.status);
    var data = await res.json();
    var all = data.team || [];

    // GOLDEN RULE + privacy: only show members WITH a real photo.
    // The /staff-status pass also confirms Active; but /team already
    // returns the public roster. We additionally require a photo so
    // test rows (ARUN, no photo) and unfinished entries never appear.
    var shown = all.filter(function(m){ return m.photo && m.photo.length > 5; });

    if (shown.length === 0) {
      grid.innerHTML =
        '<div class="assembling">' +
          '<div class="assembling-mark">&#10022;</div>' +
          '<div class="assembling-title">Our Team is Being Assembled</div>' +
          '<div class="assembling-text">Every artist is chosen with care. Meet them here very soon.</div>' +
        '</div>';
      closing.style.display = 'none';
      return;
    }

    grid.innerHTML = shown.map(function(m){
      return '<div class="member">' +
        '<img src="' + esc(m.photo) + '" alt="' + esc(m.name) + '">' +
        '<div class="member-veil"></div>' +
        '<div class="member-edge"></div>' +
        '<div class="member-label">' +
          '<div class="member-name">' + esc(m.name) + '</div>' +
          '<div class="member-mark"></div>' +
        '</div>' +
      '</div>';
    }).join('');
    closing.style.display = 'block';
  } catch (e) {
    console.error('Team load failed:', e.message);
    grid.innerHTML =
      '<div class="assembling">' +
        '<div class="assembling-mark">&#10022;</div>' +
        '<div class="assembling-title">Our Team is Being Assembled</div>' +
        '<div class="assembling-text">Every artist is chosen with care. Meet them here very soon.</div>' +
      '</div>';
    closing.style.display = 'none';
  }
}
loadTeam();
</script>
</body>
</html>
